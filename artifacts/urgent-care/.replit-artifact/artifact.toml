kind = "web"
previewPath = "/urgent-care"
title = "Urgent Care"
version = "1.0.0"
id = "artifacts/urgent-care"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25563

[services.development]
run = "pnpm --filter @workspace/urgent-care run dev"

[services.development.env]
PORT = "25563"

[services.production]
build = [ "pnpm", "--filter", "@workspace/urgent-care", "run", "build" ]

[services.production.run]
args = ["node", "artifacts/urgent-care/.next/standalone/artifacts/urgent-care/server.js"]

[services.production.run.env]
HOSTNAME = "0.0.0.0"
NODE_ENV = "production"
NEXTAUTH_URL = "https://urgentcare.ubiehealth.com"

[services.production.health.startup]
path = "/urgent-care"
